<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wuhan Metro Map</title>
    <link rel="stylesheet" href="../vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="home-view" class="home-view">
        <header class="home-header">
          <div>
            <h1>中国主要城市地铁线路与站点图 / Metro Lines and Stations in Major Chinese Cities</h1>
            <p>选择省份或搜索城市，打开对应城市的交互式地铁线路与站点地图。Choose a province or search a city to open an interactive metro map.</p>
          </div>
          <div class="home-controls">
            <label class="field">
              <span>省份 / Province</span>
              <select id="province-filter"></select>
            </label>
            <label class="field">
              <span>搜索城市 / Search city</span>
              <input id="city-search" type="search" placeholder="Beijing / 北京" autocomplete="off" />
            </label>
          </div>
        </header>

        <section id="city-grid" class="city-grid" aria-label="Metro city list"></section>
      </section>

      <section id="map-view" class="map-view" hidden>
        <div id="map"></div>
        <header id="map-topbar" class="map-topbar">
          <button id="back-home" type="button">城市 / Cities</button>
          <div>
            <h2 id="city-title"></h2>
            <p id="city-subtitle"></p>
          </div>
          <div class="map-tools">
            <label class="field compact">
              <span>底图 / Basemap</span>
              <select id="style-select">
                <option value="amap-muted" selected>高德黑白 / Gaode muted</option>
                <option value="amap-colorful">高德彩色 / Gaode colorful</option>
                <option value="osm-muted">OSM muted</option>
                <option value="osm-colorful">OSM colorful</option>
              </select>
            </label>
            <label class="field compact">
              <span>站点 / Station</span>
              <input id="station-search" type="search" placeholder="站名 / Station" autocomplete="off" />
            </label>
            <button id="toggle-stations" type="button" aria-pressed="true">站点 / Stations</button>
            <button id="toggle-labels" type="button" aria-pressed="true">站名 / Labels</button>
            <button id="toggle-lines" type="button" aria-pressed="true">线路 / Lines</button>
            <button id="fit-map" type="button">全图 / Fit</button>
          </div>
          <button id="collapse-topbar" class="collapse-tab top-collapse" type="button" aria-expanded="true" aria-label="折叠顶部工具 / Collapse tools">⌃</button>
        </header>
        <aside id="line-legend" class="legend" aria-label="Line filters">
          <button id="collapse-legend" class="collapse-tab bottom-collapse" type="button" aria-expanded="true" aria-label="折叠线路列表 / Collapse lines">⌄</button>
          <div class="legend-title">线路 / Lines</div>
          <div id="line-filters" class="line-filters"></div>
        </aside>
      </section>
    </main>

    <script src="../vendor/leaflet/leaflet.js"></script>
    <script src="../data.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
